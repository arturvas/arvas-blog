# Hugo configuration file
# Dev mode: hugo server --renderSegments recent
segments:
  recent:
    includes:
    - kind: '{home,section,taxonomy,term}'
    - path: '{posts/2026/**,posts/2027/**,/about}'

title: ArVas
enableEmoji: true
locale: "pt-BR"
defaultContentLanguage: "pt-br"
baseURL: "https://www.arvas.pages.dev/"

disableKinds:
- term

languages:
  pt-br:
    label: "Português"
    locale: "pt-BR"
    weight: 1
    menu:
      main:
        - name: Tema
          weight: 0
          params:
            type: theme-toggle
        - name: Sobre
          pageRef: /about
          weight: 1
        - name: Buscar
          weight: 3
          params:
            type: search
      sidebar:
        - name: Posts Off-Topic
          weight: 4
          url: "/off-topic/"
          params:
            icon: chat-bubble-left-right

outputs:
  home: [HTML, SearchIndex]

outputFormats:
  SearchIndex:
    mediaType: application/json
    baseName: search-index
    isPlainText: true
    notAlternative: true

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

params:
  # Disable Hextra's built-in FlexSearch: it shipped a ~14 MB client index
  # to a DuckDuckGo `site:` query instead — zero payload, full-text, instant.
  search:
    enable: true

  navbar:
    displayTitle: true
    displayLogo: true

  comments:
    enable: false
    type: giscus

    giscus:
      repo: "arturvas/arvas-blog"
      repoID: "R_kgDOTbAlcQ"
      category: "Announcements"
      categoryID: "DIC_kwDOTbAlcc4DBh-b"
      mapping: "pathname"

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"

  # Keep default youtube shortcode as configurable
  youtubeDefaults:
    iframeAllowList: "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy: "no-referrer"
    iframeStyle: "border:0; width:100%; aspect-ratio:16/9;"

  theme:
    default: light

  author:
    name: Artur Vasconcelos
    email: artur.vasconcelos8@gmail.com

  description: "Blog do Artur Vasconcelos, um brasileiro fazendo medicina na Argentina."

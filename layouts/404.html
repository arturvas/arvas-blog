{{- /* Override of the Hextra 404 page so it picks up i18n strings.
       The default vendored version hardcodes "This page could not be found." */ -}}
<!doctype html>
<html lang="{{ site.Language.Lang }}">
  <body
    style='font-family:system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji"; height:100vh; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center'
  >
    <div>
      <style>
        body {
          color: #000;
          background: #fff;
          margin: 0;
        }

        .hextra-error-h1 {
          border-right: 1px solid rgba(0, 0, 0, 0.3);
        }

        @media (prefers-color-scheme: dark) {
          body {
            color: #fff;
            background: #000;
          }

          .hextra-error-h1 {
            border-right: 1px solid rgba(255, 255, 255, 0.3);
          }
        }

        a {
          color: inherit;
          text-decoration: underline;
        }
      </style>
      <h1
        class="hextra-error-h1"
        style='display: inline-block; margin: 0 20px 0 0; padding-right: 23px; font-size: 24px; font-weight: 500; vertical-align: top; line-height: 49px; font-feature-settings: "rlig" 1,"calt" 1,"ss01" 1,"ss06" 1 !important;'
      >
        404
      </h1>
      <div style="display: inline-block; text-align: left">
        <h2 style="font-size: 14px; font-weight: 400; line-height: 49px; margin: 0">{{ T "pageNotFound" }}</h2>
        <p style="font-size: 13px; margin: 0; opacity: 0.7;">
          <a href="{{ if eq site.Language.Lang "en" }}/en/{{ else }}/{{ end }}">{{ T "backToHome" }}</a>
        </p>
      </div>
    </div>
  </body>
</html>
